<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e8edf7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .phone {
        width: 390px;
        height: 844px;
        max-width: calc(100vw - 24px);
        max-height: calc(100vh - 24px);
        border: 12px solid #111827;
        border-radius: 34px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="Phone-sized app preview">
      <iframe src="/" title="NEVERFLAT mobile preview"></iframe>
    </main>
  </body>
</html>
