version: '3.8'

services:
  app:
    container_name: neverflat-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run start:dev
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: development
