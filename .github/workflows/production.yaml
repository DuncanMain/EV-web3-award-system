name: Deploy Neverflat to Development

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Generate .env
        run: |
          cat <<EOF > .env
          NODE_ENV=production
          LOG_DESTINATION=${{ secrets.LOG_DESTINATION }}
          APP_VERSION=${{ secrets.APP_VERSION }}
          EOF

      - name: Copy to server via SCP
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: '.'
          target: ~/neverflat/deploy

      - name: SSH & (re)deploy
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            DEPLOY_DIR=~/neverflat/deploy
            LIVE_DIR=~/neverflat/live

            # Stop existing containers
            docker compose -f $LIVE_DIR/docker-compose.yaml down --remove-orphans || true

            # Swap deploy → live
            rm -rf $LIVE_DIR
            mv $DEPLOY_DIR $LIVE_DIR

            cd $LIVE_DIR

            # Ensure shared network exists
            docker network create shared-proxy 2>/dev/null || true

            # Build and start
            echo "Pruning remote build cache older than 24h…"
            docker builder prune --all --force --filter "until=24h" || true

            docker compose up -d --build
